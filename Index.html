<script>
(function () {
  // Local conversational personality for J.A.R.V.I.S.
  var jarvisResponses = [
    "At your service, sir.",
    "Systems are operating within optimal parameters.",
    "I am monitoring all micro-frequencies, sir.",
    "Always a pleasure watching you work, sir.",
    "The arc reactor is stable. What is our next move?",
    "Operational efficiency is currently at ninety-nine percent, sir."
  ];

  var history = [];
  var thinking = false;

  var chat = document.getElementById('chat');
  var input = document.getElementById('input');
  var sendBtn = document.getElementById('sendBtn');
  var coreWrap = document.getElementById('coreWrap');
  var subtitle = document.getElementById('subtitle');

  // --- VOICE SYNTHESIS (Speaking) ---
  function speak(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      var utterance = new SpeechSynthesisUtterance(text);
      var voices = window.speechSynthesis.getVoices();
      var ukVoice = voices.find(v => v.lang.includes('en-GB') || v.name.includes('Google UK English'));
      if (ukVoice) utterance.voice = ukVoice;
      utterance.rate = 1.0;
      utterance.pitch = 0.9;
      window.speechSynthesis.speak(utterance);
    }
  }

  // --- VOICE RECOGNITION (Listening) ---
  var Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recognizer = null;
  
  if (Recognition) {
    recognizer = new Recognition();
    recognizer.continuous = false;
    recognizer.interimResults = false;
    recognizer.lang = 'en-US';

    recognizer.onstart = function() {
      subtitle.textContent = "LISTENING...";
    };

    recognizer.onresult = function(event) {
      var resultText = event.results[0][0].transcript;
      input.value = resultText;
      sendMessage();
    };

    recognizer.onerror = function() {
      subtitle.textContent = "SYSTEMS NOMINAL";
    };

    recognizer.onend = function() {
      if (!thinking) subtitle.textContent = "SYSTEMS NOMINAL";
    };
  }

  function timeGreeting() {
    var h = new Date().getHours();
    if (h < 5) return "You're up rather late, sir.";
    if (h < 12) return 'Good morning, sir.';
    if (h < 17) return 'Good afternoon, sir.';
    if (h < 21) return 'Good evening, sir.';
    return 'Burning the midnight oil, I see, sir.';
  }

  function addMessage(role, text) {
    var wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    var label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'jarvis' ? 'J.A.R.V.I.S.' : 'YOU';
    var body = document.createElement('div');
    body.className = 'msg-body';
    body.textContent = text;
    wrap.appendChild(label);
    wrap.appendChild(body);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    var el = document.createElement('div');
    el.className = 'typing';
    el.id = 'typingIndicator';
    el.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    var el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function setThinking(state) {
    thinking = state;
    coreWrap.classList.toggle('thinking', state);
    subtitle.textContent = state ? 'PROCESSING...' : 'SYSTEMS NOMINAL';
    sendBtn.disabled = state;
    input.disabled = state;
  }

  // --- LOCAL NAVIGATION & APP COMMANDS ---
  function handleLocalCommands(text) {
    var query = text.toLowerCase();
    if (query.includes('open google')) {
      window.open('https://www.google.com', '_blank');
      return "Right away, sir. Opening Google.";
    }
    if (query.includes('open youtube')) {
      window.open('https://www.youtube.com', '_blank');
      return "Very good, sir. Launching YouTube.";
    }
    return null;
  }

  function sendMessage() {
    var text = input.value.trim();
    if (!text || thinking) return;

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    input.value = '';
    setThinking(true);
    showTyping();

    // 1. Check for application triggers first
    var localResponse = handleLocalCommands(text);
    if (localResponse) {
      setTimeout(function() {
        hideTyping();
        addMessage('jarvis', localResponse);
        speak(localResponse);
        setThinking(false);
      }, 700);
      return;
    }

    // 2. Browser-safe local responses instead of direct server API fetch
    setTimeout(function() {
      hideTyping();
      var randomReply = jarvisResponses[Math.floor(Math.random() * jarvisResponses.length)];
      addMessage('jarvis', randomReply);
      speak(randomReply);
      history.push({ role: 'assistant', content: randomReply });
      setThinking(false);
      input.focus();
    }, 1000);
  }

  // Click the Arc Reactor ring to trigger voice listening
  coreWrap.style.cursor = 'pointer';
  coreWrap.addEventListener('click', function() {
    if (recognizer && !thinking) {
      recognizer.start();
    } else if (!recognizer) {
      alert("Voice recognition is not fully supported or allowed on this connection, sir.");
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function boot() {
    setTimeout(function () {
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
      
      subtitle.textContent = 'SYSTEMS NOMINAL';
      input.disabled = false;
      sendBtn.disabled = false;
      var greeting = timeGreeting() + ' J.A.R.V.I.S. online and at your service.';
      addMessage('jarvis', greeting);
      speak(greeting);
      history.push({ role: 'assistant', content: greeting });
      input.focus();
    }, 1100);
  }

  boot();
})();
</script>
