<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.A.R.V.I.S.</title>
  <style>
    :root {
      --void: #060a10;
      --panel: #0d1620;
      --panel-border: rgba(90, 215, 255, 0.22);
      --reactor: #5ad7ff;
      --reactor-dim: #1e4a5c;
      --signal: #e4f3f8;
      --muted: #62808f;
      --user-panel: #121f2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, #0f2230 0%, transparent 60%), var(--void);
      color: var(--signal);
      /* Use system fonts so Google Fonts don't block the screen loading */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
      border-left: 1px solid var(--panel-border);
      border-right: 1px solid var(--panel-border);
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--panel-border);
      position: relative;
      flex-shrink: 0;
    }

    .core-wrap { position: relative; width: 34px; height: 34px; margin-right: 14px; flex-shrink: 0; cursor: pointer; }
    .core-ring {
      position: absolute; inset: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: conic-gradient(from 0deg, var(--reactor), transparent 45%, var(--reactor) 100%);
      animation: rotate 6s linear infinite;
    }
    .core-center {
      position: absolute; inset: 7px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: var(--void);
    }
    .core-center::after {
      content: '';
      position: absolute; inset: 3px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: var(--reactor);
      box-shadow: 0 0 10px 2px var(--reactor);
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    .title-block { display: flex; flex-direction: column; }
    .title {
      font-weight: bold;
      font-size: 17px;
      letter-spacing: 4px;
      color: var(--reactor);
    }
    .subtitle {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* CHAT */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg { max-width: 80%; }
    .msg-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--reactor);
      margin-bottom: 5px;
    }
    .msg.user { align-self: flex-end; }
    .msg.user .msg-label { color: var(--muted); text-align: right; }

    .msg-body {
      padding: 12px 16px;
      font-size: 15.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.jarvis .msg-body {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-left: 2px solid var(--reactor);
    }
    .msg.user .msg-body {
      background: var(--user-panel);
      border: 1px solid rgba(228, 243, 248, 0.08);
    }

    .typing { display: flex; gap: 5px; padding: 12px 16px; align-self: flex-start; }
    .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--reactor); animation: blink 1.2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }

    /* INPUT */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--panel-border);
      flex-shrink: 0;
      background: var(--void);
    }
    #input {
      flex: 1;
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--signal);
      padding: 12px 16px;
      font-size: 16px;
      outline: none;
    }
    #sendBtn {
      background: rgba(90, 215, 255, 0.1);
      border: 1px solid var(--reactor-dim);
      color: var(--reactor);
      width: 48px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="app">
    <div class="header">
      <div class="core-wrap" id="coreWrap">
        <div class="core-ring"></div>
        <div class="core-center"></div>
      </div>
      <div class="title-block">
        <div class="title">J.A.R.V.I.S.</div>
        <div class="subtitle" id="subtitle">INITIALIZING...</div>
      </div>
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
      <input type="text" id="input" placeholder="Speak your mind, sir..." autocomplete="off" disabled>
      <button id="sendBtn" aria-label="Send message" disabled>►</button>
    </div>
  </div>

  <script>
  (function () {
    var jarvisResponses = [
      "At your service, sir.",
      "Systems are operating within optimal parameters.",
      "I am monitoring all frequencies.",
      "The arc reactor is completely stable.",
      "Operational efficiency is at ninety-nine percent, sir."
    ];

    var history = [];
    var thinking = false;

    var chat = document.getElementById('chat');
    var input = document.getElementById('input');
    var sendBtn = document.getElementById('sendBtn');
    var coreWrap = document.getElementById('coreWrap');
    var subtitle = document.getElementById('subtitle');

    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(text);
        var voices = window.speechSynthesis.getVoices();
        var ukVoice = voices.find(v => v.lang.includes('en-GB') || v.name.includes('Google UK English'));
        if (ukVoice) utterance.voice = ukVoice;
        window.speechSynthesis.speak(utterance);
      }
    }

    var Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    var recognizer = null;
    
    if (Recognition) {
      recognizer = new Recognition();
      recognizer.lang = 'en-US';
      recognizer.onstart = function() { subtitle.textContent = "LISTENING..."; };
      recognizer.onresult = function(e) { input.value = e.results[0][0].transcript; sendMessage(); };
      recognizer.onerror = function() { subtitle.textContent = "SYSTEMS NOMINAL"; };
      recognizer.onend = function() { if (!thinking) subtitle.textContent = "SYSTEMS NOMINAL"; };
    }

    function addMessage(role, text) {
      var wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      var label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'jarvis' ? 'J.A.R.V.I.S.' : 'YOU';
      var body = document.createElement('div');
      body.className = 'msg-body';
      body.textContent = text;
      wrap.appendChild(label);
      wrap.appendChild(body);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function handleLocalCommands(text) {
      var query = text.toLowerCase();
      if (query.includes('open google')) { window.open('https://www.google.com', '_blank'); return "Opening Google, sir."; }
      if (query.includes('open youtube')) { window.open('https://www.youtube.com', '_blank'); return "Launching YouTube, sir."; }
      return null;
    }

    function sendMessage() {
      var text = input.value.trim();
      if (!text || thinking) return;

      addMessage('user', text);
      input.value = '';
      thinking = true;
      sendBtn.disabled = true;
      input.disabled = true;
      subtitle.textContent = 'PROCESSING...';

      var cmdReply = handleLocalCommands(text);
      if (cmdReply) {
        setTimeout(function() {
          addMessage('jarvis', cmdReply);
          speak(cmdReply);
          thinking = false;
          sendBtn.disabled = false;
          input.disabled = false;
          subtitle.textContent = 'SYSTEMS NOMINAL';
        }, 600);
        return;
      }

      setTimeout(function() {
        var reply = jarvisResponses[Math.floor(Math.random() * jarvisResponses.length)];
        addMessage('jarvis', reply);
        speak(reply);
        thinking = false;
        sendBtn.disabled = false;
        input.disabled = false;
        subtitle.textContent = 'SYSTEMS NOMINAL';
        input.focus();
      }, 1000);
    }

    coreWrap.addEventListener('click', function() {
      if (recognizer && !thinking) recognizer.start();
    });

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') sendMessage(); });

    setTimeout(function () {
      subtitle.textContent = 'SYSTEMS NOMINAL';
      input.disabled = false;
      sendBtn.disabled = false;
      addMessage('jarvis', "Systems nominal. J.A.R.V.I.S. online.");
      speak("Systems nominal. J.A.R.V.I.S. online.");
      input.focus();
    }, 1000);
  })();
  </script>
</body>
</html>
